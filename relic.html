<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relicbound</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script> 
    <script src="./script/imageExpand.js"></script>
    <script src="./imagelist.js"></script>
    <link rel="icon" type="image/x-icon" href="./images/SiteLogo.png">
</head>
<body>
    <div id= "nav"></div>
    <div class="boundary pattern2">       

        <h1>Relicbound</h1>
        <div class="tag-holder">
            <div class="tag">2D Character Art</div>
            <div class="tag">Visual FX</div>
        </div>
        <h3>Concept art for a third person platformer</h3>
        <p>Relicbound is a project which is on hold. During the development, I created concept art for characters and objects and worked on particle effects.</p>

        <h2>Halen</h2>

        <div id="halenViewer"></div>

        <h2>Enemies, Side characters, and objects</h2>

        <div id="otherViewer"></div>

        <button onclick="gotoTop()" id="btnTop" title="Go to top">Go to top</button>
    </div>
    <div id="footer"></div>
    <script>
        $.get("navigation.html", function(data){
            $("#nav").replaceWith(data);
        });
        $.get("footer.html", function(data){
            $("#footer").replaceWith(data);
        });  
        var slides1 = {
            currentSlide:0,
            thisID: "halenViewer",
            imgs: halenImgs};
            var slides2 = {
            currentSlide:0,
            thisID: "otherViewer",
            imgs: relicImgs
        };
        createSlideViewer(slides1);
        createSlideViewer(slides2);
    </script>
</body>
</html>
